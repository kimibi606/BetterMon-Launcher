name: Release Launcher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish GitHub release
        run: npm run release:github
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BETTERMON_GITHUB_OWNER: kimibi606
          BETTERMON_GITHUB_REPO: BetterMon-Launcher
